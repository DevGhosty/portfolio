<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Steven Rosas resume">
  <meta name="theme-color" content="#000000">
  <title>Steven Rosas | Resume</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">

  <script src="../js/theme-boot.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/tailwind-config.js"></script>
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body class="min-h-screen">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <div class="grain-overlay" aria-hidden="true"></div>

  <div class="page-content">
  <nav id="site-nav"
    class="site-nav fixed top-0 w-full z-50 border-b border-white/10 bg-black/90 backdrop-blur-sm md:bg-black/80 md:backdrop-blur-md transition-[background,backdrop-filter,box-shadow] duration-300"
    aria-label="Resume navigation">
    <div
      class="nav-shell max-w-6xl mx-auto px-4 sm:px-6 py-4 sm:py-5 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between min-w-0 transition-[padding] duration-300 ease-out">
      <a href="../home" id="nav-brand" class="font-display transition-opacity duration-300 shrink-0">Hello There<span
          class="nav-brand-dot">.</span></a>

      <div class="flex items-center gap-2 sm:gap-4 w-full sm:w-auto min-w-0 justify-stretch sm:justify-end">
        <a href="../Steven-Rosas-Resume.pdf" download
          class="resume-download-btn border border-slate-500 hover:border-blue-400 px-4 py-2.5 sm:px-6 sm:py-3 rounded-3xl font-semibold text-sm sm:text-base inline-flex items-center justify-center min-h-[2.75rem] flex-1 sm:flex-initial text-center whitespace-normal leading-snug text-slate-200 hover:text-white">Download
          PDF</a>
        <button id="theme-toggle" type="button"
          class="relative w-14 h-8 shrink-0 rounded-full p-1 transition-all duration-300 focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:ring-offset-2 focus-visible:ring-offset-transparent">
          <div id="toggle-track"
            class="absolute inset-0 rounded-full transition-all duration-300 flex items-center px-1">
            <span id="sun-icon" class="text-yellow-300 text-lg transition-opacity">&#9728;&#65039;</span>
            <span id="moon-icon" class="text-slate-200 text-lg transition-opacity ml-auto">&#127769;</span>
          </div>
          <div id="toggle-knob" class="relative w-6 h-6 bg-white rounded-full shadow-lg transition-all duration-300">
          </div>
        </button>
      </div>
    </div>
  </nav>

  <main id="main-content" tabindex="-1" class="pt-[4.75rem] sm:pt-28 pb-10 sm:pb-12 px-4 sm:px-6 min-w-0">
    <section class="max-w-6xl mx-auto min-w-0">
      <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-6 sm:mb-8 min-w-0">
        <div class="min-w-0">
          <h1 class="text-3xl sm:text-5xl md:text-6xl font-bold tracking-tighter accent-blue">Resume</h1>
          <p class="mt-3 text-sm sm:text-base text-slate-400 leading-relaxed max-w-2xl">View the current resume here or download the PDF.</p>
          <p class="mt-2 text-xs sm:text-sm footer-secondary">Last Updated: 4/27/2026</p>
        </div>
      </div>

      <div
        class="bg-slate-900/70 border border-blue-900/30 backdrop-blur-sm md:backdrop-blur-md rounded-3xl overflow-hidden p-3 sm:p-4 md:p-6 min-w-0">
        <img src="../resume-preview.png" alt="Steven Rosas resume preview"
          class="w-full max-w-full h-auto block rounded-2xl" loading="lazy" decoding="async">
      </div>
    </section>
  </main>

  <footer
    class="border-t border-white/5 bg-black pt-8 px-4 sm:px-6 pb-[max(2.5rem,env(safe-area-inset-bottom,0px))] text-center">
    <a href="../home"
      class="text-sm text-slate-400 hover:text-blue-400 transition-colors inline-flex items-center justify-center min-h-[2.75rem] px-2">Back
      to portfolio</a>
  </footer>

  </div>

  <script src="../js/particles.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/main.js"></script>
</body>

</html>
