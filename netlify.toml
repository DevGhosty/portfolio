[build]
publish = "."

[[headers]]
for = "/*"
[headers.values]
Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self'; form-action 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
X-Frame-Options = "DENY"

[[redirects]]
from = "/"
to = "/home"
status = 301

[[redirects]]
from = "/home/"
to = "/home"
status = 301

[[redirects]]
from = "/resume/"
to = "/resume"
status = 301

[[redirects]]
from = "/home"
to = "/home.html"
status = 200

[[redirects]]
from = "/resume"
to = "/resume.html"
status = 200
